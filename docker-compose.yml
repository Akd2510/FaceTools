services:
  db:
    image: postgres:15-alpine
    container_name: facetools_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: facevision
      POSTGRES_USER: facevision
      POSTGRES_PASSWORD: facevision_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facevision"]
      interval: 10s
      timeout: 5s
      retries: 5

  facevision_backend:
    build:
      context: ./facevision-backend
      dockerfile: Dockerfile
    container_name: facevision_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://facevision:facevision_secret@db:5432/facevision
      DJANGO_SECRET_KEY: "facetools-secret-key-123"
      DJANGO_DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,facevision_backend"
      MEDIA_ROOT: /app/media
    volumes:
      - ./facevision-backend:/app
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

  faceswap_backend:
    build:
      context: ./faceswap-backend
      dockerfile: Dockerfile
    container_name: faceswap_backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MODELS_DIR=/app/models
      - TEMPLATES_DIR=/app/templates
    volumes:
      - ./models:/app/models
      - ./templates:/app/templates
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_OPTIONS: "--max_old_space_size=2048"
        CI: "false"
        GENERATE_SOURCEMAP: "false"
    container_name: facetools_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost
    depends_on:
      - facevision_backend
      - faceswap_backend

  nginx:
    image: nginx:alpine
    container_name: facetools_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_files:/app/media:ro
    depends_on:
      - facevision_backend
      - faceswap_backend
      - frontend

volumes:
  postgres_data:
  media_files:
