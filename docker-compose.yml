version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: facetools_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: facevision
      POSTGRES_USER: facevision
      POSTGRES_PASSWORD: facevision_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facevision"]
      interval: 10s
      timeout: 5s
      retries: 5

  facevision_backend:
    image: akshatdikshit/facevision-backend:latest
    container_name: facevision_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://facevision:facevision_secret@db:5432/facevision
      DJANGO_SECRET_KEY: "facetools-secret-key-123"
      DJANGO_DEBUG: "False"
      ALLOWED_HOSTS: "*"
      MEDIA_ROOT: /app/media
    volumes:
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"

  faceswap_backend:
    image: akshatdikshit/faceswap-backend:latest
    container_name: faceswap_backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MODELS_DIR=/app/models
      - TEMPLATES_DIR=/app/templates
    volumes:
      - ./models:/app/models
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    image: akshatdikshit/facevision-frontend:latest
    container_name: facetools_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost
    depends_on:
      - facevision_backend
      - faceswap_backend

  nginx:
    # Using your new custom image!
    image: akshatdikshit/facetools-nginx:latest
    container_name: facetools_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # No more local nginx.conf mount needed!
      - media_files:/app/media:ro
    depends_on:
      - facevision_backend
      - faceswap_backend
      - frontend

volumes:
  postgres_data:
  media_files:
