events {
    #worker_processes auto;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    upstream facevision_backend { server facevision_backend:8000; }
    upstream faceswap_backend  { server faceswap_backend:8000; }
    upstream frontend           { server frontend:3000; }

    server {
        listen 80;
        server_name localhost;

        # FaceSwap API (FastAPI)
        location ~ ^/(swap|templates) {
            proxy_pass         http://faceswap_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # FaceVision API (Django)
        location /api/ {
            proxy_pass         http://facevision_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Django admin / static (Django specific)
        location /admin/ {
            proxy_pass         http://facevision_backend;
            proxy_set_header   Host $host;
        }

        # FaceVision specific static files (if any) - but let React take priority for /static/
        location /django_static/ {
            proxy_pass http://facevision_backend;
        }

        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # React frontend & static assets
        location /static/ {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
